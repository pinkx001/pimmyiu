<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>austinshop Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #fff9fb 0%, #fcecf2 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(244, 114, 182, 0.15), 
                        inset 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .virtual-card:hover {
            transform: translateY(-4px);
        }
        .virtual-card:active {
            transform: translateY(2px) scale(0.98);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#fffdfa', 100: '#fdf5ee', 200: '#fae8d4' },
                        brown: { 300: '#d4b49e', 400: '#bc9680', 500: '#8b5e3c', 600: '#5c3d26' },
                        pink: { 50: '#fff0f5', 100: '#ffe0ec', 200: '#ffc2d9', 300: '#ffa3c6', 400: '#ff85b3', 500: '#ff66a0' }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-brown-600 relative overflow-x-hidden">

    <!-- Background Decorative SVGs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-pink-300 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[15%] left-[2%] w-6 h-6 text-white/60 anim-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute top-[8%] left-[25%] w-4 h-4 text-pink-400/50 anim-float-3" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
        <svg class="absolute top-[10%] right-[8%] w-10 h-10 text-pink-200 anim-float-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute top-[2%] right-[20%] w-5 h-5 text-white/80 anim-float-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-brown-500/95 backdrop-blur-sm text-cream-50 px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-brown-400">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <!-- Container หลัก -->
    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <!-- Header -->
        <div class="text-center pt-2 pb-2 relative">
            <h1 class="text-2xl font-bold tracking-tight text-pink-500 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-pink-400 anim-pulse"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2 12.28 2 8.25 2 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" /></svg>
                austinshop
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-pink-400 anim-pulse transform -scale-x-100"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2 12.28 2 8.25 2 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" /></svg>
            </h1>
            <p class="text-sm font-medium text-brown-400 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-3 relative z-10">
            
            <div class="relative p-2 rounded-[36px] z-10">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" /></svg>
                <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
                    <img src="https://i.postimg.cc/445v1HPJ/mi-m-ch-x-107-20260620100128.png" alt="austinshop" class="w-full h-auto object-cover">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <h2 class="text-xl font-bold text-brown-600">วิธีเข้าใช้งานเน็ตฟลิกซ์</h2>
                    <p class="text-sm text-brown-500">อ่านก่อนเข้าด้วยน้า</p>
                </div>

                <!-- กล่องเตือน ดีไซน์คูปอง -->
                <div class="relative bg-gradient-to-br from-pink-100/90 to-pink-50/90 rounded-[20px] p-4 border-2 border-dashed border-pink-300 shadow-sm z-10 overflow-hidden mt-1">
                    <svg class="absolute -right-3 -bottom-3 w-14 h-14 text-pink-200/60 transform -rotate-12 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    
                    <div class="flex items-start gap-3 relative z-10">
                        <div class="bg-pink-400 p-1.5 rounded-full shadow-md text-white flex-shrink-0 mt-1 animate-bounce">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                        <div class="text-[13px] text-brown-600 leading-relaxed text-left">
                            <span class="font-bold text-pink-500">📍คำเตือน</span><br>
                            • อ่านในป้ายเท่านั้นไม่มี Otp เข้าเมล<br>
                            • ยกเลิกไม่คืนเงินทุกกรณี<br>
                            • เมลโดนปิดไม่รับเคลม มีประกันแยก เพิ่ม+99฿<br>
                            <span class="block mt-2 font-semibold">กรุณาทำตามกฎร้านอย่างเคร่งครัด</span>
                        </div>
                    </div>
                </div>

                <!-- ส่วนคงไว้ 100% ของบัญชี (ใช้สมมติฐานเลขเดิมหากไม่ได้แจ้งใหม่) -->
                <div class="space-y-4">
                     <!-- บัญชี (โค้ดเดิมคงไว้) -->
                     <div class="virtual-card relative bg-gradient-to-br from-brown-400 to-brown-500 rounded-[24px] p-5 shadow-lg shadow-brown-500/20 border border-brown-300/30 cursor-pointer" onclick="copyText('0000000000', this, 'kbank')">
                        <div class="relative z-10 flex flex-col gap-4">
                            <div class="flex justify-between items-center">
                                <div class="bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full border border-white/20"><span class="text-white font-bold text-sm">KBank</span></div>
                                <button class="kbank-btn bg-white text-brown-500 text-[12px] font-bold px-4 py-2 rounded-full shadow-sm">คัดลอก</button>
                            </div>
                            <div>
                                <div class="text-white font-bold text-[22px] tracking-widest">0000000000</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, containerElement, type) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2500);
        }
    </script>
</body>
</html>
